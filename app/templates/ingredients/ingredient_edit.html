{% extends "base.html" %}

{% block title %}Edit Ingredient — Fridge Manager{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h1>Edit Ingredient</h1>

        <form method="POST" action="{{ url_for('main.ingredient_edit', id=ingredient.id) }}">

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" value="{{ ingredient.name }}" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" step="0.01" min="0.01"
                           value="{{ ingredient.quantity }}" required>
                </div>
                <div class="form-group">
                    <label for="unit">Unit</label>
                    <select id="unit" name="unit" required>
                        {% for unit in units %}
                            <option value="{{ unit }}" {{ 'selected' if ingredient.unit == unit }}>{{ unit }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    {% for cat in categories %}
                        <option value="{{ cat }}" {{ 'selected' if ingredient.category == cat }}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="expiry_date">Expiry Date <span class="muted">(optional)</span></label>
                <input type="date" id="expiry_date" name="expiry_date"
                       value="{{ ingredient.expiry_date.isoformat() if ingredient.expiry_date else '' }}">
            </div>

            <div class="form-actions">
                <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
